    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: var(--black); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; -webkit-font-smoothing: antialiased; }

    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--white); letter-spacing: 0.01em; margin-bottom: 12px; }
    p { color: var(--muted); font-size: 15px; margin-bottom: 32px; line-height: 1.6; }
    .links { display: flex; flex-direction: column; gap: 10px; }
    a.btn { display: block; background: var(--yellow); color: var(--black); font-weight: 700; font-size: 14px; padding: 12px 24px; border-radius: 6px; text-decoration: none; }
    a.btn:hover { background: var(--yellow-dark); }
    a.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    a.btn-outline:hover { border-color: var(--yellow); color: var(--yellow); }

</head>
